services:
  - type: web
    name: robot-score
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: robot-score-db
          property: connectionString

databases:
  - name: robot-score-db
    plan: free
