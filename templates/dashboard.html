<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Score – Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { background: #ffffff; }
    .dashboard-wrap { max-width: 1100px; margin: 0 auto; padding: 20px 24px; }
    .section-title {
      font-size: 1.1rem; color: #64748b; text-transform: uppercase;
      letter-spacing: 1px; margin: 28px 0 12px; border-bottom: 1px solid #e2e8f0;
      padding-bottom: 6px;
    }
    .rank-row {
      display: flex; align-items: center; padding: 10px 14px;
      background: #f8fafc; border-radius: 10px; margin-bottom: 6px;
      border: 1px solid #e2e8f0; transition: background .2s;
    }
    .rank-row:nth-child(1) { border-color: #fbbf24; background: #fef9c3; border-width: 3px; padding: 18px 20px; }
    .rank-row:nth-child(2) { border-color: #94a3b8; background: #f1f5f9; border-width: 3px; padding: 16px 20px; }
    .rank-row:nth-child(3) { border-color: #d97706; background: #ffedd5; border-width: 3px; padding: 14px 20px; }
    .rank-pos { width: 40px; text-align: center; font-weight: 800; font-size: 1.2rem; color: #94a3b8; }
    .rank-row:nth-child(1) .rank-pos { color: #d97706; font-size: 2rem; }
    .rank-row:nth-child(2) .rank-pos { color: #64748b; font-size: 1.8rem; }
    .rank-row:nth-child(3) .rank-pos { color: #b45309; font-size: 1.6rem; }
    .rank-name { flex: 1; font-weight: 600; font-size: 1.1rem; margin-left: 10px; color: #1e293b; }
    .rank-row:nth-child(1) .rank-name { font-size: 2rem; font-weight: 800; }
    .rank-row:nth-child(2) .rank-name { font-size: 1.7rem; font-weight: 700; }
    .rank-row:nth-child(3) .rank-name { font-size: 1.5rem; font-weight: 700; }
    .rank-detail { font-size: 0.78rem; color: #94a3b8; margin-left: 10px; }
    .rank-score { font-size: 1.4rem; font-weight: 800; color: #d97706; min-width: 80px; text-align: right; }
    .rank-row:nth-child(1) .rank-score { font-size: 2.4rem; }
    .rank-row:nth-child(2) .rank-score { font-size: 2rem; }
    .rank-row:nth-child(3) .rank-score { font-size: 1.8rem; }
    .game-tag {
      font-size: 0.7rem; background: #f1f5f9; color: #64748b;
      padding: 2px 8px; border-radius: 6px; margin-left: 8px;
    }
    .no-data { text-align: center; color: #94a3b8; padding: 40px; font-size: 1.1rem; }

    /* Rank change animations */
    .rank-change { font-size: 0.75rem; margin-left: 6px; font-weight: 700; vertical-align: middle; display: inline-block; }
    .rank-up { color: #16a34a; animation: popUp 0.6s ease-out; }
    .rank-down { color: #dc2626; animation: popDown 0.6s ease-out; }
    .rank-new { color: #2563eb; animation: fadeIn 0.6s ease-out; }
    @keyframes popUp {
      0% { transform: translateY(8px); opacity: 0; }
      50% { transform: translateY(-3px); opacity: 1; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes popDown {
      0% { transform: translateY(-8px); opacity: 0; }
      50% { transform: translateY(3px); opacity: 1; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }
    .rank-row.moved-up {
      animation: slideUp 0.5s ease-out;
    }
    .rank-row.moved-down {
      animation: slideDown 0.5s ease-out;
    }
    .rank-row.new-entry {
      animation: fadeInRow 0.5s ease-out;
    }
    @keyframes slideUp {
      0% { transform: translateY(20px); opacity: 0.5; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideDown {
      0% { transform: translateY(-20px); opacity: 0.5; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeInRow {
      0% { opacity: 0; transform: translateX(-20px); }
      100% { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="dashboard-wrap">
    <div class="dashboard-header">
      <h1 id="seriesName">🤖 Robot Score</h1>
      <div id="gameBadge"></div>
      <!-- Planning countdown timer (visible when game not running) -->
      <div id="planningTimer" style="display:none;margin-top:12px;text-align:center">
        <div id="planningEdit" style="display:flex;align-items:center;justify-content:center;gap:8px">
          <input type="number" id="planMin" value="12" min="0" max="99" style="width:60px;font-size:1.2rem;text-align:center;padding:6px;border:2px solid #e2e8f0;border-radius:8px"> <span style="font-size:1.2rem;color:#64748b">min</span>
          <input type="number" id="planSec" value="0" min="0" max="59" style="width:60px;font-size:1.2rem;text-align:center;padding:6px;border:2px solid #e2e8f0;border-radius:8px"> <span style="font-size:1.2rem;color:#64748b">sec</span>
          <button onclick="startPlanTimer()" style="background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer">▶ Start</button>
        </div>
        <div id="planningDisplay" style="display:none">
          <div id="planCountdown" style="font-size:4rem;font-weight:800;color:#3b82f6;margin:8px 0"></div>
          <button onclick="resetPlanTimer()" style="background:#e2e8f0;color:#334155;border:none;padding:6px 14px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer">⟲ Reset</button>
        </div>
      </div>
    </div>

    <div id="noData" class="no-data" style="display:none">No active series – waiting for game to start…</div>

    <div id="content" style="display:none">
      <div class="section-title"><span class="live-dot"></span> Current Game Ranking</div>
      <div id="gameRanking"></div>

      <div class="section-title">All Teams – Series Ranking</div>
      <div id="allRanking"></div>
    </div>
  </div>

  <script>
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // Store previous rank positions per container
    const prevRanks = {};

    function teamKey(r) { return (r.team_id || r.team_name) + '|' + (r.game_name || ''); }

    function renderRanking(container, rows) {
      const cid = container.id;
      if (!rows.length) {
        container.innerHTML = '<div class="no-data">No teams yet</div>';
        prevRanks[cid] = {};
        return;
      }

      // Build lookup of previous positions
      const prev = prevRanks[cid] || {};
      const curr = {};
      rows.forEach((r, i) => { curr[teamKey(r)] = i; });

      const icons = ['🥇', '🥈', '🥉'];
      container.innerHTML = rows.map((r, i) => {
        const details = r.details.map(d => {
          if (d.button_image) {
            return '<img src="' + esc(d.button_image) + '" alt="' + esc(d.button_label) + '" style="width:40px;height:40px;object-fit:contain;vertical-align:middle;margin-right:2px">' + esc(d.button_label) + ':<span style="font-size:1.3rem;font-weight:700">' + d.clicks + '</span>';
          }
          return esc(d.button_label) + ':<span style="font-size:1.3rem;font-weight:700">' + d.clicks + '</span>';
        }).join(' &nbsp; ');
        const gameTag = r.game_name ? '<span class="game-tag">' + esc(r.game_name) + '</span>' : '';
        const iconSizes = ['2.2rem', '1.9rem', '1.6rem'];
        const icon = i < 3 ? '<span style="font-size:' + iconSizes[i] + ';margin-right:4px">' + icons[i] + '</span>' : '';
        const posText = i < 3 ? icon : '<span>#' + (i + 1) + '</span>';

        // Determine rank change
        const key = teamKey(r);
        let changeHtml = '';
        let rowClass = 'rank-row';
        if (Object.keys(prev).length > 0) {
          if (prev[key] === undefined) {
            changeHtml = '<span class="rank-change rank-new">★ NEW</span>';
            rowClass += ' new-entry';
          } else {
            const delta = prev[key] - i; // positive = moved up
            if (delta > 0) {
              changeHtml = '<span class="rank-change rank-up">▲' + delta + '</span>';
              rowClass += ' moved-up';
            } else if (delta < 0) {
              changeHtml = '<span class="rank-change rank-down">▼' + Math.abs(delta) + '</span>';
              rowClass += ' moved-down';
            }
          }
        }

        return '<div class="' + rowClass + '">'
          + '<div class="rank-pos">' + posText + '</div>'
          + '<div class="rank-name">' + esc(r.team_name) + changeHtml + gameTag + '</div>'
          + '<div class="rank-detail">' + details + '</div>'
          + '<div class="rank-score">' + r.total_points + '</div>'
          + '</div>';
      }).join('');

      // Save current positions for next comparison
      prevRanks[cid] = curr;
    }

    function formatTimer(game) {
      if (!game || game.remaining_seconds == null) return '';
      const rem = Math.max(0, Math.ceil(game.remaining_seconds));
      const mins = Math.floor(rem / 60);
      const secs = rem % 60;
      const color = rem <= 10 ? '#dc2626' : rem <= 30 ? '#f59e0b' : '#16a34a';
      return '<div style="font-weight:800;color:' + color + ';font-size:2.5rem;margin-top:4px">⏱ ' + mins + ':' + String(secs).padStart(2, '0') + '</div>';
    }

    // Planning countdown timer state
    let planEnd = null;
    let planInterval = null;

    function startPlanTimer() {
      const mins = parseInt(document.getElementById('planMin').value) || 0;
      const secs = parseInt(document.getElementById('planSec').value) || 0;
      const total = mins * 60 + secs;
      if (total <= 0) return;
      planEnd = Date.now() + total * 1000;
      document.getElementById('planningEdit').style.display = 'none';
      document.getElementById('planningDisplay').style.display = '';
      if (planInterval) clearInterval(planInterval);
      planInterval = setInterval(tickPlanTimer, 200);
      tickPlanTimer();
    }

    function tickPlanTimer() {
      const rem = Math.max(0, Math.ceil((planEnd - Date.now()) / 1000));
      const mins = Math.floor(rem / 60);
      const secs = rem % 60;
      const el = document.getElementById('planCountdown');
      el.textContent = '⏱ ' + mins + ':' + String(secs).padStart(2, '0');
      el.style.color = rem <= 10 ? '#dc2626' : rem <= 30 ? '#f59e0b' : '#3b82f6';
      if (rem <= 0) {
        clearInterval(planInterval);
        planInterval = null;
        el.textContent = '⏱ Time!';
        el.style.color = '#dc2626';
      }
    }

    function resetPlanTimer() {
      if (planInterval) clearInterval(planInterval);
      planInterval = null;
      planEnd = null;
      document.getElementById('planningEdit').style.display = 'flex';
      document.getElementById('planningDisplay').style.display = 'none';
    }

    function updatePlanTimerVisibility(activeGame) {
      const el = document.getElementById('planningTimer');
      if (!activeGame || activeGame.status !== 'running') {
        el.style.display = '';
      } else {
        el.style.display = 'none';
        // Auto-reset when game starts
        if (planInterval) resetPlanTimer();
      }
    }

    async function refresh() {
      try {
        const d = await (await fetch('/api/dashboard')).json();
        if (!d.series) {
          document.getElementById('noData').style.display = '';
          document.getElementById('content').style.display = 'none';
          return;
        }
        document.getElementById('noData').style.display = 'none';
        document.getElementById('content').style.display = '';
        document.getElementById('seriesName').textContent = '🤖 ' + d.series.name;
        document.getElementById('gameBadge').innerHTML = d.active_game
          ? '<div class="game-badge">'
            + (d.active_game.status === 'running' ? '<span class="live-dot"></span>' : '')
            + esc(d.active_game.name)
            + (d.active_game.status === 'paused' ? ' <small style="opacity:0.7">⏸ PAUSED</small>' : '')
            + (d.active_game.status === 'stopped' ? ' <small style="opacity:0.7">⏹ STOPPED</small>' : '')
            + '</div>'
            + formatTimer(d.active_game)
          : '<div class="game-badge" style="color:#94a3b8">No active game</div>';

        renderRanking(document.getElementById('gameRanking'), d.game_ranking);
        renderRanking(document.getElementById('allRanking'), d.all_ranking);
        updatePlanTimerVisibility(d.active_game);
      } catch (e) { /* retry next tick */ }
    }

    refresh();
    setInterval(refresh, 1000); // Auto-refresh every 1 second
  </script>
</body>
</html>
