<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Score – Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { background: #ffffff; }
    .dashboard-wrap { max-width: 1100px; margin: 0 auto; padding: 20px 24px; padding-top: 56px; }
    .section-title {
      font-size: 1.1rem; color: #64748b; text-transform: uppercase;
      letter-spacing: 1px; margin: 28px 0 12px; border-bottom: 1px solid #e2e8f0;
      padding-bottom: 6px;
    }
    .rank-row {
      display: flex; align-items: center; padding: 10px 14px;
      background: #f8fafc; border-radius: 10px; margin-bottom: 6px;
      border: 1px solid #e2e8f0; transition: background .2s;
    }
    .rank-row:nth-child(1) { border-color: #fbbf24; background: #fef9c3; border-width: 3px; padding: 18px 20px; }
    .rank-row:nth-child(2) { border-color: #94a3b8; background: #f1f5f9; border-width: 3px; padding: 16px 20px; }
    .rank-pos { width: 40px; text-align: center; font-weight: 800; font-size: 1.2rem; color: #94a3b8; }
    .rank-row:nth-child(1) .rank-pos { color: #d97706; font-size: 2rem; }
    .rank-row:nth-child(2) .rank-pos { color: #64748b; font-size: 1.8rem; }
    .rank-name { flex: 1; font-weight: 600; font-size: 1.1rem; margin-left: 10px; color: #1e293b; }
    .rank-row:nth-child(1) .rank-name { font-size: 2rem; font-weight: 800; }
    .rank-row:nth-child(2) .rank-name { font-size: 1.7rem; font-weight: 700; }
    .rank-detail { font-size: 0.78rem; color: #94a3b8; margin-left: 10px; }
    .rank-score { font-size: 1.4rem; font-weight: 800; color: #d97706; min-width: 80px; text-align: right; }
    .rank-row:nth-child(1) .rank-score { font-size: 2.4rem; }
    .rank-row:nth-child(2) .rank-score { font-size: 2rem; }
    .game-tag {
      font-size: 0.7rem; background: #f1f5f9; color: #64748b;
      padding: 2px 8px; border-radius: 6px; margin-left: 8px;
    }
    .no-data { text-align: center; color: #94a3b8; padding: 40px; font-size: 1.1rem; }

    /* Rank change animations */
    .rank-change { font-size: 0.75rem; margin-left: 6px; font-weight: 700; vertical-align: middle; display: inline-block; }
    .rank-up { color: #16a34a; animation: popUp 0.6s ease-out; }
    .rank-down { color: #dc2626; animation: popDown 0.6s ease-out; }
    .rank-new { color: #2563eb; animation: fadeIn 0.6s ease-out; }
    @keyframes popUp {
      0% { transform: translateY(8px); opacity: 0; }
      50% { transform: translateY(-3px); opacity: 1; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes popDown {
      0% { transform: translateY(-8px); opacity: 0; }
      50% { transform: translateY(3px); opacity: 1; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }
    .rank-row.moved-up {
      animation: slideUp 0.5s ease-out;
    }
    .rank-row.moved-down {
      animation: slideDown 0.5s ease-out;
    }
    .rank-row.new-entry {
      animation: fadeInRow 0.5s ease-out;
    }
    @keyframes slideUp {
      0% { transform: translateY(20px); opacity: 0.5; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideDown {
      0% { transform: translateY(-20px); opacity: 0.5; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeInRow {
      0% { opacity: 0; transform: translateX(-20px); }
      100% { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <!-- Top toolbar -->
  <div id="toggleBar" style="display:none;position:fixed;top:0;left:0;right:0;background:#f8fafc;border-bottom:2px solid #e2e8f0;padding:8px 16px;z-index:100">
    <div style="max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button id="toggleTimerBtn" onclick="toggleTimerPanel()" style="background:#e2e8f0;color:#334155;border:none;padding:5px 14px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer">⏱ Hide Timer</button>
      <button id="toggleGameRankBtn" onclick="toggleGameRanking()" style="background:#e2e8f0;color:#334155;border:none;padding:5px 14px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer">🏁 Hide Game Rank</button>
      <button id="toggleSeriesBtn" onclick="toggleSeriesRanking()" style="background:#e2e8f0;color:#334155;border:none;padding:5px 14px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer">🏆 Show Series Rank</button>
    </div>
  </div>

  <div class="dashboard-wrap">
    <div class="dashboard-header">
      <h1 id="seriesName">🤖 Robot Score</h1>
      <div id="gameBadge"></div>
      <!-- Planning countdown timer (visible when game not running) -->
      <div id="planningTimer" style="display:none;margin-top:12px;text-align:center">
        <div id="planningEdit" style="display:flex;align-items:center;justify-content:center;gap:8px">
          <input type="number" id="planMin" value="10" min="0" max="99" style="width:60px;font-size:1.2rem;text-align:center;padding:6px;border:2px solid #e2e8f0;border-radius:8px"> <span style="font-size:1.2rem;color:#64748b">min</span>
          <input type="number" id="planSec" value="0" min="0" max="59" style="width:60px;font-size:1.2rem;text-align:center;padding:6px;border:2px solid #e2e8f0;border-radius:8px"> <span style="font-size:1.2rem;color:#64748b">sec</span>
          <button onclick="startPlanTimer()" style="background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer">▶ Start</button>
        </div>
        <div id="planningDisplay" style="display:none">
          <div id="planCountdown" style="font-size:4rem;font-weight:800;color:#3b82f6;margin:8px 0"></div>
          <button onclick="resetPlanTimer()" style="background:#e2e8f0;color:#334155;border:none;padding:6px 14px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer">⟲ Reset</button>
        </div>
      </div>
    </div>

    <div id="noData" class="no-data" style="display:none">No active series – waiting for game to start…</div>

    <div id="content" style="display:none">
      <div id="timerPanel">
      </div>

      <div id="gameRankPanel">
        <div class="section-title"><span class="live-dot"></span> Current Game Ranking</div>
        <div id="gameRanking"></div>
      </div>

      <div class="section-title">
        <span>All Teams – Series Ranking</span>
      </div>
      <div id="allRanking" style="display:none"></div>
    </div>

    <!-- Music Player -->
    <div id="musicPlayer" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#f8fafc;border-top:2px solid #e2e8f0;padding:8px 16px;z-index:100">
      <div style="max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px">
        <button onclick="prevSong()" style="background:none;border:none;font-size:1.2rem;cursor:pointer">⏮</button>
        <button id="playPauseBtn" onclick="togglePlay()" style="background:#3b82f6;color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer">▶</button>
        <button onclick="nextSong()" style="background:none;border:none;font-size:1.2rem;cursor:pointer">⏭</button>
        <div style="flex:1;min-width:0">
          <div id="nowPlaying" style="font-weight:600;font-size:0.85rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">♫ No songs</div>
          <div style="font-size:0.7rem;color:#94a3b8" id="songIndex"></div>
        </div>
        <button onclick="toggleMusicPanel()" style="background:#e2e8f0;border:none;padding:4px 10px;border-radius:6px;font-size:0.75rem;font-weight:600;cursor:pointer;color:#334155">♫ List</button>
        <button id="repeatBtn" onclick="toggleRepeat()" style="background:none;border:none;font-size:1.1rem;cursor:pointer;opacity:0.4" title="Repeat one">🔂</button>
      </div>
      <div id="songListPanel" style="display:none;max-width:1100px;margin:6px auto 0;max-height:150px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;background:#fff">
        <div id="dashSongList"></div>
      </div>
      <audio id="audioEl" preload="auto"></audio>
    </div>
  </div>

  <script>
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function toggleSeriesRanking() {
      const el = document.getElementById('allRanking');
      const btn = document.getElementById('toggleSeriesBtn');
      if (el.style.display === 'none') {
        el.style.display = '';
        btn.textContent = '🏆 Hide Series Rank';
      } else {
        el.style.display = 'none';
        btn.textContent = '🏆 Show Series Rank';
      }
    }

    let timerVisible = true;
    let gameRankVisible = true;

    function toggleTimerPanel() {
      timerVisible = !timerVisible;
      document.getElementById('timerPanel').style.display = timerVisible ? '' : 'none';
      document.getElementById('planningTimer').style.display = timerVisible ? '' : 'none';
      document.getElementById('toggleTimerBtn').textContent = timerVisible ? '⏱ Hide Timer' : '⏱ Show Timer';
    }

    function toggleGameRanking() {
      gameRankVisible = !gameRankVisible;
      document.getElementById('gameRankPanel').style.display = gameRankVisible ? '' : 'none';
      document.getElementById('toggleGameRankBtn').textContent = gameRankVisible ? '🏁 Hide Game Rank' : '🏁 Show Game Rank';
    }

    // Store previous rank positions per container
    const prevRanks = {};

    function teamKey(r) { return (r.team_id || r.team_name) + '|' + (r.game_name || ''); }

    function renderRanking(container, rows) {
      const cid = container.id;
      if (!rows.length) {
        container.innerHTML = '<div class="no-data">No teams yet</div>';
        prevRanks[cid] = {};
        return;
      }

      // Build lookup of previous positions
      const prev = prevRanks[cid] || {};
      const curr = {};
      rows.forEach((r, i) => { curr[teamKey(r)] = i; });

      const icons = ['🥇', '🥈'];
      container.innerHTML = rows.map((r, i) => {
        const details = r.details.map(d => {
          if (d.button_image) {
            return '<img src="' + esc(d.button_image) + '" alt="' + esc(d.button_label) + '" style="width:40px;height:40px;object-fit:contain;vertical-align:middle;margin-right:2px">' + esc(d.button_label) + ':<span style="font-size:1.3rem;font-weight:700">' + d.clicks + '</span>';
          }
          return esc(d.button_label) + ':<span style="font-size:1.3rem;font-weight:700">' + d.clicks + '</span>';
        }).join(' &nbsp; ');
        const gameTag = r.game_name ? '<span class="game-tag">' + esc(r.game_name) + '</span>' : '';
        const iconSizes = ['2.2rem', '1.9rem'];
        const icon = i < 2 ? '<span style="font-size:' + iconSizes[i] + ';margin-right:4px">' + icons[i] + '</span>' : '';
        const posText = i < 2 ? icon : '<span>#' + (i + 1) + '</span>';

        // Determine rank change
        const key = teamKey(r);
        let changeHtml = '';
        let rowClass = 'rank-row';
        if (Object.keys(prev).length > 0) {
          if (prev[key] === undefined) {
            changeHtml = '<span class="rank-change rank-new">★ NEW</span>';
            rowClass += ' new-entry';
          } else {
            const delta = prev[key] - i; // positive = moved up
            if (delta > 0) {
              changeHtml = '<span class="rank-change rank-up">▲' + delta + '</span>';
              rowClass += ' moved-up';
            } else if (delta < 0) {
              changeHtml = '<span class="rank-change rank-down">▼' + Math.abs(delta) + '</span>';
              rowClass += ' moved-down';
            }
          }
        }

        return '<div class="' + rowClass + '">'
          + '<div class="rank-pos">' + posText + '</div>'
          + '<div class="rank-name">' + esc(r.team_name) + (r.start_order ? ' <span class="game-tag">起點 #' + r.start_order + '</span>' : '') + changeHtml + gameTag + '</div>'
          + '<div class="rank-detail">' + details + '</div>'
          + '<div class="rank-score">' + r.total_points + '</div>'
          + '</div>';
      }).join('');

      // Save current positions for next comparison
      prevRanks[cid] = curr;
    }

    function formatTimer(game) {
      if (!game || game.remaining_seconds == null) return '';
      if (game.status === 'stopped') return '';
      const rem = Math.max(0, Math.ceil(game.remaining_seconds));
      const mins = Math.floor(rem / 60);
      const secs = rem % 60;
      const color = rem <= 10 ? '#dc2626' : rem <= 30 ? '#f59e0b' : '#16a34a';
      return '<div style="font-weight:800;color:' + color + ';font-size:4rem;margin-top:4px;text-align:center">⏱ ' + mins + ':' + String(secs).padStart(2, '0') + '</div>';
    }

    // Planning countdown timer state
    let planEnd = null;
    let planInterval = null;

    function startPlanTimer() {
      const mins = parseInt(document.getElementById('planMin').value) || 0;
      const secs = parseInt(document.getElementById('planSec').value) || 0;
      const total = mins * 60 + secs;
      if (total <= 0) return;
      planEnd = Date.now() + total * 1000;
      document.getElementById('planningEdit').style.display = 'none';
      document.getElementById('planningDisplay').style.display = '';
      if (planInterval) clearInterval(planInterval);
      planInterval = setInterval(tickPlanTimer, 200);
      tickPlanTimer();
    }

    function tickPlanTimer() {
      const rem = Math.max(0, Math.ceil((planEnd - Date.now()) / 1000));
      const mins = Math.floor(rem / 60);
      const secs = rem % 60;
      const el = document.getElementById('planCountdown');
      el.textContent = '⏱ ' + mins + ':' + String(secs).padStart(2, '0');
      el.style.color = rem <= 180 ? '#dc2626' : rem <= 300 ? '#f59e0b' : '#3b82f6';
      if (rem <= 0) {
        clearInterval(planInterval);
        planInterval = null;
        el.textContent = '⏱ Time!';
        el.style.color = '#dc2626';
      }
    }

    function resetPlanTimer() {
      if (planInterval) clearInterval(planInterval);
      planInterval = null;
      planEnd = null;
      document.getElementById('planningEdit').style.display = 'flex';
      document.getElementById('planningDisplay').style.display = 'none';
    }

    function updatePlanTimerVisibility(activeGame) {
      const el = document.getElementById('planningTimer');
      if (!timerVisible) { el.style.display = 'none'; return; }
      if (!activeGame || activeGame.status !== 'running') {
        el.style.display = '';
      } else {
        el.style.display = 'none';
        // Auto-reset when game starts
        if (planInterval) resetPlanTimer();
      }
    }

    async function refresh() {
      try {
        const d = await (await fetch('/api/dashboard')).json();
        if (!d.series) {
          document.getElementById('noData').style.display = '';
          document.getElementById('content').style.display = 'none';
          document.getElementById('toggleBar').style.display = 'none';
          return;
        }
        document.getElementById('noData').style.display = 'none';
        document.getElementById('content').style.display = '';
        document.getElementById('toggleBar').style.display = '';
        document.getElementById('seriesName').textContent = '🤖 ' + d.series.name;
        const timerTarget = document.getElementById('timerPanel');
        timerTarget.innerHTML = d.active_game
          ? '<div class="game-badge">'
            + (d.active_game.status === 'running' ? '<span class="live-dot"></span>' : '')
            + esc(d.active_game.name)
            + (d.active_game.status === 'paused' ? ' <small style="opacity:0.7">⏸ PAUSED</small>' : '')
            + (d.active_game.status === 'stopped' ? ' <small style="opacity:0.7">⏹ STOPPED</small>' : '')
            + '</div>'
            + formatTimer(d.active_game)
          : '<div class="game-badge" style="color:#94a3b8">No active game</div>';
        document.getElementById('gameBadge').innerHTML = '';

        renderRanking(document.getElementById('gameRanking'), d.game_ranking);
        renderRanking(document.getElementById('allRanking'), d.all_ranking);
        updatePlanTimerVisibility(d.active_game);
        updateSongList(d.songs);
      } catch (e) { /* retry next tick */ }
    }

    // Music player
    let songList = [];
    let currentSongIdx = -1;
    const audioEl = document.getElementById('audioEl');

    function updateSongList(songs) {
      if (!songs || !songs.length) {
        document.getElementById('musicPlayer').style.display = 'none';
        songList = [];
        return;
      }
      document.getElementById('musicPlayer').style.display = '';
      // Only update if song list changed
      const newIds = songs.map(s => s.id).join(',');
      const oldIds = songList.map(s => s.id).join(',');
      if (newIds !== oldIds) {
        songList = songs;
        if (currentSongIdx < 0) {
          currentSongIdx = 0;
          loadCurrentSong();
        }
        renderSongListPanel();
      }
    }

    function renderSongListPanel() {
      const el = document.getElementById('dashSongList');
      el.innerHTML = songList.map((s, i) =>
        '<div onclick="playSongAt(' + i + ')" style="padding:6px 12px;cursor:pointer;border-bottom:1px solid #f1f5f9;' + (i === currentSongIdx ? 'background:#eff6ff;font-weight:700' : '') + '">'
        + '<span style="color:#3b82f6;margin-right:6px">' + (i === currentSongIdx ? '\u25b6' : '') + '</span>'
        + esc(s.title)
        + '</div>'
      ).join('');
    }

    function loadCurrentSong() {
      if (currentSongIdx < 0 || !songList.length) return;
      const s = songList[currentSongIdx];
      document.getElementById('nowPlaying').textContent = '\u266b ' + s.title;
      document.getElementById('songIndex').textContent = (currentSongIdx + 1) + ' / ' + songList.length;
      audioEl.src = s.url;
      renderSongListPanel();
    }

    function togglePlay() {
      if (!songList.length) return;
      if (currentSongIdx < 0) { currentSongIdx = 0; loadCurrentSong(); }
      if (audioEl.paused) {
        audioEl.play();
        document.getElementById('playPauseBtn').textContent = '\u23f8';
      } else {
        audioEl.pause();
        document.getElementById('playPauseBtn').textContent = '\u25b6';
      }
    }

    function nextSong() {
      if (!songList.length) return;
      currentSongIdx = (currentSongIdx + 1) % songList.length;
      loadCurrentSong();
      audioEl.play();
      document.getElementById('playPauseBtn').textContent = '\u23f8';
    }

    function prevSong() {
      if (!songList.length) return;
      currentSongIdx = (currentSongIdx - 1 + songList.length) % songList.length;
      loadCurrentSong();
      audioEl.play();
      document.getElementById('playPauseBtn').textContent = '\u23f8';
    }

    function playSongAt(idx) {
      currentSongIdx = idx;
      loadCurrentSong();
      audioEl.play();
      document.getElementById('playPauseBtn').textContent = '\u23f8';
    }

    function toggleMusicPanel() {
      const el = document.getElementById('songListPanel');
      el.style.display = el.style.display === 'none' ? '' : 'none';
    }

    let repeatOne = false;

    function toggleRepeat() {
      repeatOne = !repeatOne;
      const btn = document.getElementById('repeatBtn');
      btn.style.opacity = repeatOne ? '1' : '0.4';
      btn.style.background = repeatOne ? '#dbeafe' : 'none';
      btn.style.borderRadius = '6px';
    }

    audioEl.addEventListener('ended', function() {
      if (repeatOne) {
        audioEl.currentTime = 0;
        audioEl.play();
      } else {
        nextSong();
      }
    });

    refresh();
    setInterval(refresh, 1000); // Auto-refresh every 1 second
  </script>
</body>
</html>
