<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Score – Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { background: #ffffff; }
    .dashboard-wrap { max-width: 1100px; margin: 0 auto; padding: 20px 24px; padding-top: 56px; }
    .section-title {
      font-size: 1.1rem; color: #64748b; text-transform: uppercase;
      letter-spacing: 1px; margin: 28px 0 12px; border-bottom: 1px solid #e2e8f0;
      padding-bottom: 6px;
    }
    .rank-row {
      display: flex; align-items: center; padding: 10px 14px;
      background: #f8fafc; border-radius: 10px; margin-bottom: 6px;
      border: 1px solid #e2e8f0; transition: background .2s;
    }
    .rank-row:nth-child(1) { border-color: #fbbf24; background: #fef9c3; border-width: 3px; padding: 18px 20px; }
    .rank-row:nth-child(2) { border-color: #94a3b8; background: #f1f5f9; border-width: 3px; padding: 16px 20px; }
    .rank-pos { width: 40px; text-align: center; font-weight: 800; font-size: 1.2rem; color: #94a3b8; }
    .rank-row:nth-child(1) .rank-pos { color: #d97706; font-size: 2rem; }
    .rank-row:nth-child(2) .rank-pos { color: #64748b; font-size: 1.8rem; }
    .rank-name { flex: 1; font-weight: 600; font-size: 1.1rem; margin-left: 10px; color: #1e293b; }
    .rank-row:nth-child(1) .rank-name { font-size: 2rem; font-weight: 800; }
    .rank-row:nth-child(2) .rank-name { font-size: 1.7rem; font-weight: 700; }
    .rank-detail { font-size: 0.78rem; color: #94a3b8; margin-left: 10px; }
    .rank-score { font-size: 1.4rem; font-weight: 800; color: #d97706; min-width: 80px; text-align: right; }
    .rank-row:nth-child(1) .rank-score { font-size: 2.4rem; }
    .rank-row:nth-child(2) .rank-score { font-size: 2rem; }
    .game-tag {
      font-size: 0.7rem; background: #f1f5f9; color: #64748b;
      padding: 2px 8px; border-radius: 6px; margin-left: 8px;
    }
    .no-data { text-align: center; color: #94a3b8; padding: 40px; font-size: 1.1rem; }

    /* Rank change animations */
    .rank-change { font-size: 0.75rem; margin-left: 6px; font-weight: 700; vertical-align: middle; display: inline-block; }
    .rank-up { color: #16a34a; animation: popUp 0.6s ease-out; }
    .rank-down { color: #dc2626; animation: popDown 0.6s ease-out; }
    .rank-new { color: #2563eb; animation: fadeIn 0.6s ease-out; }
    @keyframes popUp {
      0% { transform: translateY(8px); opacity: 0; }
      50% { transform: translateY(-3px); opacity: 1; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes popDown {
      0% { transform: translateY(-8px); opacity: 0; }
      50% { transform: translateY(3px); opacity: 1; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }
    .rank-row.moved-up {
      animation: slideUp 0.5s ease-out;
    }
    .rank-row.moved-down {
      animation: slideDown 0.5s ease-out;
    }
    .rank-row.new-entry {
      animation: fadeInRow 0.5s ease-out;
    }
    @keyframes slideUp {
      0% { transform: translateY(20px); opacity: 0.5; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideDown {
      0% { transform: translateY(-20px); opacity: 0.5; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeInRow {
      0% { opacity: 0; transform: translateX(-20px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    /* ── Draw animation overlay ─── */
    #drawOverlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px);
      flex-direction: column; align-items: center; justify-content: center;
      font-family: inherit;
    }
    #drawOverlay.active { display: flex; }
    #drawOverlay.active ~ * { overflow: hidden; }
    body.draw-active { overflow: hidden; }

    .draw-title {
      font-size: 2.5rem; font-weight: 800; color: #fbbf24; margin-bottom: 32px;
      animation: drawTitlePulse 1.5s ease-in-out infinite;
    }
    @keyframes drawTitlePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }
    .draw-title.done { animation: none; }

    .draw-grid {
      display: flex; flex-direction: column; gap: 12px; width: 90%;
      max-width: 600px; max-height: 70vh; overflow-y: auto; padding: 0 16px;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .draw-grid::-webkit-scrollbar { display: none; }
    .draw-card {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(30, 41, 59, 0.8); border: 2px solid #334155;
      border-radius: 14px; padding: 14px 24px; opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease-out, border-color 0.4s, background 0.4s;
    }
    .draw-card.swapping {
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .draw-card.revealed {
      opacity: 1; transform: translateY(0);
      border-color: #3b82f6; background: rgba(59, 130, 246, 0.12);
    }
    .draw-card.shuffling {
      opacity: 1; transform: translateY(0); border-color: #475569;
    }
    .draw-card-name {
      font-size: 1.4rem; font-weight: 700; color: #e2e8f0;
    }
    .draw-card-number {
      font-size: 2rem; font-weight: 900; color: #94a3b8;
      min-width: 60px; text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .draw-card.revealed .draw-card-number {
      color: #fbbf24; text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
      animation: numberReveal 0.5s ease-out;
    }
    @keyframes numberReveal {
      0% { transform: scale(2) rotate(10deg); opacity: 0; }
      60% { transform: scale(1.15) rotate(-3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }
    .draw-dismiss {
      margin-top: 28px; background: #3b82f6; color: #fff; border: none;
      padding: 12px 36px; border-radius: 12px; font-size: 1.1rem;
      font-weight: 700; cursor: pointer; display: none;
      transition: background 0.2s;
    }
    .draw-dismiss:hover { background: #2563eb; }
    .draw-dismiss.visible { display: block; animation: fadeIn 0.5s ease-out; }
  </style>
</head>
<body>
  <!-- Top toolbar -->
  <div id="toggleBar" style="display:none;position:fixed;top:0;left:0;right:0;background:#f8fafc;border-bottom:2px solid #e2e8f0;padding:8px 16px;z-index:100">
    <div style="max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button id="toggleTimerBtn" onclick="toggleTimerPanel()" style="background:#e2e8f0;color:#334155;border:none;padding:5px 14px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer">⏱ Timer</button>
      <button id="toggleGameRankBtn" onclick="toggleGameRanking()" style="background:#e2e8f0;color:#334155;border:none;padding:5px 14px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer">🏁 Game</button>
      <button id="toggleSeriesBtn" onclick="toggleSeriesRanking()" style="background:#e2e8f0;color:#334155;border:none;padding:5px 14px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer">🏆 Series</button>
      <button id="topToggleQrBtn" onclick="toggleQr()" style="background:#e2e8f0;color:#334155;border:none;padding:5px 14px;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;display:none">🔗 QR</button>
    </div>
  </div>

  <!-- Draw Animation Overlay -->
  <div id="drawOverlay">
    <div class="draw-title" id="drawTitle">🎲 Starting Order Draw</div>
    <div class="draw-grid" id="drawGrid"></div>
    <button class="draw-dismiss" id="drawDismiss" onclick="dismissDraw()">OK</button>
  </div>

  <div class="dashboard-wrap">
    <div class="dashboard-header">
      <h1 id="seriesName">🤖 Robot Score</h1>
      <div id="gameBadge"></div>
      <!-- Planning countdown timer (visible when game not running) -->
      <div id="planningTimer" style="display:none;margin-top:12px;text-align:center">
        <div id="planningEdit" style="display:flex;align-items:center;justify-content:center;gap:8px">
          <input type="number" id="planMin" value="10" min="0" max="99" style="width:60px;font-size:1.2rem;text-align:center;padding:6px;border:2px solid #e2e8f0;border-radius:8px"> <span style="font-size:1.2rem;color:#64748b">min</span>
          <input type="number" id="planSec" value="0" min="0" max="59" style="width:60px;font-size:1.2rem;text-align:center;padding:6px;border:2px solid #e2e8f0;border-radius:8px"> <span style="font-size:1.2rem;color:#64748b">sec</span>
          <button onclick="startPlanTimer()" style="background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer">▶ Start</button>
        </div>
        <div id="planningDisplay" style="display:none">
          <div id="planCountdown" style="font-size:4rem;font-weight:800;color:#3b82f6;margin:8px 0"></div>
          <button onclick="resetPlanTimer()" style="background:#e2e8f0;color:#334155;border:none;padding:6px 14px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer">⟲ Reset</button>
        </div>
      </div>
    </div>

    <div id="noData" class="no-data" style="display:none">No active series – waiting for game to start…</div>

    <div id="content" style="display:none">
      <div id="timerPanel">
      </div>

      <!-- QR Code panel: show/hide controlled by button -->
      <div id="qrPanel" style="display:none;margin:14px auto;max-width:420px;text-align:center">
        <div id="qrContainer" style="display:none;border:0px solid #e2e8f0;padding:12px;border-radius:8px;background:#fff;max-width:250px;margin:0 auto">
          <img id="qrImage" src="" alt="QR code" style="width:250px;max-width:100%;height:auto;display:block;margin:0 auto;">
          <div style="margin-top:8px;color:#64748b;font-size:0.95rem">Scan to join</div>
        </div>
      </div>

      <div id="gameRankPanel" style="display:none">
        <div class="section-title"><span class="live-dot"></span> Current Game Ranking</div>
        <div id="gameRanking"></div>
      </div>

      <div id="seriesTitle" class="section-title" style="display:none">
        <span>All Teams – Series Ranking</span>
      </div>
      <div id="allRanking" style="display:none"></div>
    </div>

    <!-- Music Player -->
    <div id="musicPlayer" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#f8fafc;border-top:2px solid #e2e8f0;padding:8px 16px;z-index:100">
      <div style="max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px">
        <button onclick="prevSong()" style="background:none;border:none;font-size:1.2rem;cursor:pointer">⏮</button>
        <button id="playPauseBtn" onclick="togglePlay()" style="background:#3b82f6;color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer">▶</button>
        <button onclick="nextSong()" style="background:none;border:none;font-size:1.2rem;cursor:pointer">⏭</button>
        <div style="flex:1;min-width:0">
          <div id="nowPlaying" style="font-weight:600;font-size:0.85rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">♫ No songs</div>
          <div style="font-size:0.7rem;color:#94a3b8" id="songIndex"></div>
        </div>
        <button onclick="toggleMusicPanel()" style="background:#e2e8f0;border:none;padding:4px 10px;border-radius:6px;font-size:0.75rem;font-weight:600;cursor:pointer;color:#334155">♫ List</button>
        <button id="repeatBtn" onclick="toggleRepeat()" style="background:none;border:none;font-size:1.1rem;cursor:pointer;opacity:0.4" title="Repeat one">🔂</button>
      </div>
      <div id="songListPanel" style="display:none;max-width:1100px;margin:6px auto 0;max-height:150px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;background:#fff">
        <div id="dashSongList"></div>
      </div>
      <audio id="audioEl" preload="auto"></audio>
    </div>
    <!-- Banner shown when browser blocks remote audio playback -->
    <div id="audioUnlockBanner" onclick="dismissAudioBanner()" style="display:none;position:fixed;top:0;left:0;right:0;background:#fbbf24;color:#1e293b;text-align:center;padding:12px;font-weight:700;font-size:1rem;cursor:pointer;z-index:200">🔊 Click here to enable remote audio playback</div>
  </div>

  <script>
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function toggleSeriesRanking() {
      const el = document.getElementById('allRanking');
      const title = document.getElementById('seriesTitle');
      const btn = document.getElementById('toggleSeriesBtn');
      if (el.style.display === 'none') {
        el.style.display = '';
        if (title) title.style.display = '';
        setToggleBtnState('toggleSeriesBtn', true);
      } else {
        el.style.display = 'none';
        if (title) title.style.display = 'none';
        setToggleBtnState('toggleSeriesBtn', false);
      }
    }

    function setToggleBtnState(id, visible) {
      const btn = document.getElementById(id);
      if (!btn) return;
      if (visible) {
        btn.style.background = '#2563eb';
        btn.style.color = '#ffffff';
        btn.style.fontWeight = '700';
        btn.setAttribute('aria-pressed', 'true');
      } else {
        btn.style.background = '#e2e8f0';
        btn.style.color = '#334155';
        btn.style.fontWeight = '600';
        btn.setAttribute('aria-pressed', 'false');
      }
    }

    let timerVisible = true;
    let gameRankVisible = false;

    function toggleTimerPanel() {
      timerVisible = !timerVisible;
      document.getElementById('timerPanel').style.display = timerVisible ? '' : 'none';
      document.getElementById('planningTimer').style.display = timerVisible ? '' : 'none';
      setToggleBtnState('toggleTimerBtn', timerVisible);
    }

    function toggleGameRanking() {
      gameRankVisible = !gameRankVisible;
      document.getElementById('gameRankPanel').style.display = gameRankVisible ? '' : 'none';
      setToggleBtnState('toggleGameRankBtn', gameRankVisible);
    }

    // Store previous rank positions per container
    const prevRanks = {};

    function teamKey(r) { return (r.team_id || r.team_name) + '|' + (r.game_name || ''); }

    function renderRanking(container, rows) {
      const cid = container.id;
      if (!rows.length) {
        container.innerHTML = '<div class="no-data">No teams yet</div>';
        prevRanks[cid] = {};
        return;
      }

      // Build lookup of previous positions
      const prev = prevRanks[cid] || {};
      const curr = {};
      rows.forEach((r, i) => { curr[teamKey(r)] = i; });

      const icons = ['🥇', '🥈'];
      container.innerHTML = rows.map((r, i) => {
        const details = r.details.map(d => {
          if (d.button_image) {
            return '<img src="' + esc(d.button_image) + '" alt="' + esc(d.button_label) + '" style="width:40px;height:40px;object-fit:contain;vertical-align:middle;margin-right:2px">' + esc(d.button_label) + ':<span style="font-size:1.3rem;font-weight:700">' + d.clicks + '</span>';
          }
          return esc(d.button_label) + ':<span style="font-size:1.3rem;font-weight:700">' + d.clicks + '</span>';
        }).join(' &nbsp; ');
        const gameTag = r.game_name ? '<span class="game-tag">' + esc(r.game_name) + '</span>' : '';
        const iconSizes = ['2.2rem', '1.9rem'];
        const icon = i < 2 ? '<span style="font-size:' + iconSizes[i] + ';margin-right:4px">' + icons[i] + '</span>' : '';
        const posText = i < 2 ? icon : '<span>#' + (i + 1) + '</span>';

        // Determine rank change
        const key = teamKey(r);
        let changeHtml = '';
        let rowClass = 'rank-row';
        if (Object.keys(prev).length > 0) {
          if (prev[key] === undefined) {
            changeHtml = '<span class="rank-change rank-new">★ NEW</span>';
            rowClass += ' new-entry';
          } else {
            const delta = prev[key] - i; // positive = moved up
            if (delta > 0) {
              changeHtml = '<span class="rank-change rank-up">▲' + delta + '</span>';
              rowClass += ' moved-up';
            } else if (delta < 0) {
              changeHtml = '<span class="rank-change rank-down">▼' + Math.abs(delta) + '</span>';
              rowClass += ' moved-down';
            }
          }
        }

        return '<div class="' + rowClass + '">'
          + '<div class="rank-pos">' + posText + '</div>'
          + '<div class="rank-name">' + esc(r.team_name) + (r.start_order ? ' <span class="game-tag">起點 #' + r.start_order + '</span>' : '') + changeHtml + gameTag + '</div>'
          + '<div class="rank-detail">' + details + '</div>'
          + '<div class="rank-score">' + r.total_points + '</div>'
          + '</div>';
      }).join('');

      // Save current positions for next comparison
      prevRanks[cid] = curr;
    }

    function formatTimer(game) {
      if (!game || game.remaining_seconds == null) return '';
      if (game.status === 'stopped') return '';
      const rem = Math.max(0, Math.ceil(game.remaining_seconds));
      const mins = Math.floor(rem / 60);
      const secs = rem % 60;
      const color = rem <= 10 ? '#dc2626' : rem <= 30 ? '#f59e0b' : '#16a34a';
      return '<div style="font-weight:800;color:' + color + ';font-size:4rem;margin-top:4px;text-align:center">⏱ ' + mins + ':' + String(secs).padStart(2, '0') + '</div>';
    }

    // Planning countdown timer state
    let planEnd = null;
    let planInterval = null;

    function startPlanTimer() {
      const mins = parseInt(document.getElementById('planMin').value) || 0;
      const secs = parseInt(document.getElementById('planSec').value) || 0;
      const total = mins * 60 + secs;
      if (total <= 0) return;
      planEnd = Date.now() + total * 1000;
      document.getElementById('planningEdit').style.display = 'none';
      document.getElementById('planningDisplay').style.display = '';
      if (planInterval) clearInterval(planInterval);
      planInterval = setInterval(tickPlanTimer, 200);
      tickPlanTimer();
    }

    function tickPlanTimer() {
      const rem = Math.max(0, Math.ceil((planEnd - Date.now()) / 1000));
      const mins = Math.floor(rem / 60);
      const secs = rem % 60;
      const el = document.getElementById('planCountdown');
      el.textContent = '⏱ ' + mins + ':' + String(secs).padStart(2, '0');
      el.style.color = rem <= 180 ? '#dc2626' : rem <= 300 ? '#f59e0b' : '#3b82f6';
      if (rem <= 0) {
        clearInterval(planInterval);
        planInterval = null;
        el.textContent = '⏱ Time!';
        el.style.color = '#dc2626';
      }
    }

    function resetPlanTimer() {
      if (planInterval) clearInterval(planInterval);
      planInterval = null;
      planEnd = null;
      document.getElementById('planningEdit').style.display = 'flex';
      document.getElementById('planningDisplay').style.display = 'none';
    }

    function updatePlanTimerVisibility(activeGame) {
      const el = document.getElementById('planningTimer');
      if (!timerVisible) { el.style.display = 'none'; return; }
      if (!activeGame || activeGame.status !== 'running') {
        el.style.display = '';
      } else {
        el.style.display = 'none';
        // Auto-reset when game starts
        if (planInterval) resetPlanTimer();
      }
    }

    async function refresh() {
      try {
        const d = await (await fetch('/api/dashboard')).json();
        if (!d.series) {
          document.getElementById('noData').style.display = '';
          document.getElementById('content').style.display = 'none';
          document.getElementById('toggleBar').style.display = 'none';
          return;
        }
        document.getElementById('noData').style.display = 'none';
        document.getElementById('content').style.display = '';
        document.getElementById('toggleBar').style.display = '';
        document.getElementById('seriesName').textContent = '🤖 ' + d.series.name;
        const timerTarget = document.getElementById('timerPanel');
        if (d.active_game) {
          const statusTag = d.active_game.status === 'paused'
            ? ' <small style="opacity:0.7">⏸ PAUSED</small>'
            : d.active_game.status === 'stopped'
              ? ' <small style="opacity:0.7">⏹ STOPPED</small>'
              : '';
          timerTarget.innerHTML = ''
            + formatTimer(d.active_game)
            + '<div style="text-align:center;margin-top:8px">'
            + '<div style="font-weight:800;color:#1e293b;font-size:1.25rem">' + esc(d.active_game.name) + '</div>'
            + (statusTag ? '<div style="margin-top:6px;color:#64748b;font-size:0.9rem">' + statusTag + '</div>' : '')
            + '</div>';
        } else {
          timerTarget.innerHTML = '<div class="game-badge" style="text-align:center;color:#94a3b8">No active game</div>';
        }
        document.getElementById('gameBadge').innerHTML = '';

        renderRanking(document.getElementById('gameRanking'), d.game_ranking);
        renderRanking(document.getElementById('allRanking'), d.all_ranking);
        updatePlanTimerVisibility(d.active_game);
        updateSongList(d.songs);
        // QR: show panel if configured in admin settings, but respect user's show/hide choice
        try {
          const qrPanel = document.getElementById('qrPanel');
          const qrImg = document.getElementById('qrImage');
          const toggleBtn = document.getElementById('topToggleQrBtn');
          const container = document.getElementById('qrContainer');
          // User preference persisted in localStorage as 'qr_visible' === 'false' means hidden
          const userPref = localStorage.getItem('qr_visible');
          const userHidden = userPref === 'false';
          if (d.qr_image) {
            if (qrPanel) qrPanel.style.display = '';
            if (qrImg) qrImg.src = d.qr_image;
            if (toggleBtn) toggleBtn.style.display = '';
            // If user explicitly hid the QR, keep container hidden until they toggle it back
            if (container) {
              if (userHidden) {
                container.style.display = 'none';
                setToggleBtnState('topToggleQrBtn', false);
              } else {
                container.style.display = 'block';
                setToggleBtnState('topToggleQrBtn', true);
              }
            }
          } else {
            if (qrPanel) qrPanel.style.display = 'none';
            if (qrImg) qrImg.src = '';
            if (toggleBtn) toggleBtn.style.display = 'none';
          }
        } catch (e) { /* ignore */ }
        checkDrawEvent(d.draw_event);
        applyRemoteControl(d.dashboard_control);
      } catch (e) { /* retry next tick */ }
    }

    // Music player
    let songList = [];
    let currentSongIdx = -1;
    const audioEl = document.getElementById('audioEl');

    function updateSongList(songs) {
      if (!songs || !songs.length) {
        document.getElementById('musicPlayer').style.display = 'none';
        songList = [];
        return;
      }
      document.getElementById('musicPlayer').style.display = '';
      // Only update if song list changed
      const newIds = songs.map(s => s.id).join(',');
      const oldIds = songList.map(s => s.id).join(',');
      if (newIds !== oldIds) {
        songList = songs;
        if (currentSongIdx < 0) {
          currentSongIdx = 0;
          loadCurrentSong();
        }
        renderSongListPanel();
      }
    }

    // QR panel functions (controlled from top toolbar button)
    function toggleQr() {
      const panel = document.getElementById('qrPanel');
      const container = document.getElementById('qrContainer');
      const topBtn = document.getElementById('topToggleQrBtn');
      if (!panel || !container || !topBtn) return;
      const visible = window.getComputedStyle(container).display !== 'none';
      if (!visible) {
        // show
        panel.style.display = '';
        container.style.display = 'block';
        setToggleBtnState('topToggleQrBtn', true);
        localStorage.setItem('qr_visible', 'true');
      } else {
        // hide (but keep panel wrapper present so layout doesn't jump)
        panel.style.display = '';
        container.style.display = 'none';
        setToggleBtnState('topToggleQrBtn', false);
        localStorage.setItem('qr_visible', 'false');
      }
    }

    function renderSongListPanel() {
      const el = document.getElementById('dashSongList');
      el.innerHTML = songList.map((s, i) =>
        '<div onclick="playSongAt(' + i + ')" style="padding:6px 12px;cursor:pointer;border-bottom:1px solid #f1f5f9;' + (i === currentSongIdx ? 'background:#eff6ff;font-weight:700' : '') + '">'
        + '<span style="color:#3b82f6;margin-right:6px">' + (i === currentSongIdx ? '\u25b6' : '') + '</span>'
        + esc(s.title)
        + '</div>'
      ).join('');
    }

    function loadCurrentSong() {
      if (currentSongIdx < 0 || !songList.length) return;
      const s = songList[currentSongIdx];
      document.getElementById('nowPlaying').textContent = '\u266b ' + s.title;
      document.getElementById('songIndex').textContent = (currentSongIdx + 1) + ' / ' + songList.length;
      audioEl.src = s.url;
      renderSongListPanel();
    }

    function togglePlay() {
      if (!songList.length) return;
      if (currentSongIdx < 0) { currentSongIdx = 0; loadCurrentSong(); }
      if (audioEl.paused) {
        audioEl.play();
        document.getElementById('playPauseBtn').textContent = '\u23f8';
      } else {
        audioEl.pause();
        document.getElementById('playPauseBtn').textContent = '\u25b6';
      }
    }

    function nextSong() {
      if (!songList.length) return;
      currentSongIdx = (currentSongIdx + 1) % songList.length;
      loadCurrentSong();
      audioEl.play();
      document.getElementById('playPauseBtn').textContent = '\u23f8';
    }

    function prevSong() {
      if (!songList.length) return;
      currentSongIdx = (currentSongIdx - 1 + songList.length) % songList.length;
      loadCurrentSong();
      audioEl.play();
      document.getElementById('playPauseBtn').textContent = '\u23f8';
    }

    function playSongAt(idx) {
      currentSongIdx = idx;
      loadCurrentSong();
      audioEl.play();
      document.getElementById('playPauseBtn').textContent = '\u23f8';
    }

    function toggleMusicPanel() {
      const el = document.getElementById('songListPanel');
      el.style.display = el.style.display === 'none' ? '' : 'none';
    }

    let repeatOne = true;

    function toggleRepeat() {
      repeatOne = !repeatOne;
      const btn = document.getElementById('repeatBtn');
      btn.style.opacity = repeatOne ? '1' : '0.4';
      btn.style.background = repeatOne ? '#dbeafe' : 'none';
      btn.style.borderRadius = '6px';
    }

    audioEl.addEventListener('ended', function() {
      if (repeatOne) {
        audioEl.currentTime = 0;
        audioEl.play();
      } else {
        nextSong();
      }
    });

    // ── Draw animation ──────────────────────────────
    let lastDrawTimestamp = null;
    let drawAnimating = false;

    function triggerDrawAnimation(results) {
      if (drawAnimating) return;
      drawAnimating = true;
      const overlay = document.getElementById('drawOverlay');
      const grid = document.getElementById('drawGrid');
      const title = document.getElementById('drawTitle');
      const dismissBtn = document.getElementById('drawDismiss');

      title.textContent = '🎲 Starting Order Draw';
      title.classList.remove('done');
      dismissBtn.classList.remove('visible');

      // Sort by team_index (original team order: team 1, 2, 3...)
      const teamOrder = results.slice().sort((a, b) => a.team_index - b.team_index);
      const count = teamOrder.length;

      // Build cards in original team order
      grid.innerHTML = teamOrder.map((r, i) =>
        '<div class="draw-card" id="drawCard' + i + '">'
        + '<span class="draw-card-name">' + esc(r.name) + '</span>'
        + '<span class="draw-card-number" id="drawNum' + i + '">?</span>'
        + '</div>'
      ).join('');

      overlay.classList.add('active');
      document.body.classList.add('draw-active');

      // Phase 1: Show all cards with shuffling numbers
      const shuffleIntervals = [];
      teamOrder.forEach((r, i) => {
        setTimeout(() => {
          const card = document.getElementById('drawCard' + i);
          if (card) card.classList.add('shuffling');
        }, i * 150);

        const numEl = document.getElementById('drawNum' + i);
        const intv = setInterval(() => {
          if (numEl) numEl.textContent = '#' + (Math.floor(Math.random() * count) + 1);
        }, 80);
        shuffleIntervals.push(intv);
      });

      // Phase 2: Reveal numbers one by one (reveal in team order)
      const shuffleDuration = count * 150 + 1500;
      teamOrder.forEach((r, i) => {
        setTimeout(() => {
          clearInterval(shuffleIntervals[i]);
          const card = document.getElementById('drawCard' + i);
          const numEl = document.getElementById('drawNum' + i);
          if (numEl) numEl.textContent = '起點 #' + r.start_order;
          if (card) {
            card.classList.remove('shuffling');
            card.classList.add('revealed');
          }
        }, shuffleDuration + i * 600);
      });

      // Phase 3: Swap animation — physically move cards to new positions
      const revealDone = shuffleDuration + count * 600 + 800;
      setTimeout(() => {
        title.textContent = '🎲 Reordering...';

        // Record original top positions
        const cards = teamOrder.map((r, i) => ({
          el: document.getElementById('drawCard' + i),
          startOrder: r.start_order,
          origTop: document.getElementById('drawCard' + i).getBoundingClientRect().top,
        }));

        // Get the sorted slot positions (top Y of each row)
        const slotTops = cards.map(c => c.origTop).slice().sort((a, b) => a - b);

        // Step 1: Lift cards with scale pulse + glow
        cards.forEach(c => {
          c.el.style.transition = 'transform 0.3s ease-out, box-shadow 0.3s ease-out';
          c.el.style.transform = 'translateY(0) scale(1.05)';
          c.el.style.boxShadow = '0 4px 24px rgba(59,130,246,0.35)';
          c.deltaY = slotTops[c.startOrder - 1] - c.origTop;
        });

        // Step 2: Slide cards to their target positions
        setTimeout(() => {
          cards.forEach(c => {
            c.el.style.transition = 'transform 1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.5s ease-out';
            c.el.style.transform = 'translateY(' + c.deltaY + 'px) scale(1)';
            c.el.style.boxShadow = 'none';
          });
        }, 400);

        // Step 3: After sliding settles, reorder DOM cleanly
        setTimeout(() => {
          const sorted = cards.slice().sort((a, b) => a.startOrder - b.startOrder);
          sorted.forEach(c => {
            c.el.style.transition = 'none';
            c.el.style.transform = 'translateY(0)';
            grid.appendChild(c.el);
          });
          // Force reflow then restore
          grid.offsetHeight;
          sorted.forEach(c => { c.el.style.transition = ''; });
        }, 1600);
      }, revealDone);

      // Phase 4: All done
      const totalDuration = revealDone + 2200;
      setTimeout(() => {
        title.textContent = '🎲 Draw Complete!';
        title.classList.add('done');
        dismissBtn.classList.add('visible');
      }, totalDuration);
    }

    function dismissDraw() {
      document.getElementById('drawOverlay').classList.remove('active');
      document.body.classList.remove('draw-active');
      drawAnimating = false;
    }

    function checkDrawEvent(drawEvent) {
      if (!drawEvent || !drawEvent.timestamp) return;
      if (drawEvent.timestamp !== lastDrawTimestamp) {
        lastDrawTimestamp = drawEvent.timestamp;
        triggerDrawAnimation(drawEvent.results);
      }
    }

    refresh();
    setInterval(refresh, 1000); // Auto-refresh every 1 second
    // Initialize toolbar button visual states according to defaults
    setToggleBtnState('toggleTimerBtn', timerVisible);
    setToggleBtnState('toggleGameRankBtn', gameRankVisible);
    // Series/title default hidden
    setToggleBtnState('toggleSeriesBtn', false);
    // Music repeat default on (style the button active)
    repeatOne = true;
    const repeatBtnEl = document.getElementById('repeatBtn');
    if (repeatBtnEl) {
      repeatBtnEl.style.opacity = '1';
      repeatBtnEl.style.background = '#dbeafe';
      repeatBtnEl.style.borderRadius = '6px';
    }

    // ── Remote dashboard control from admin ──────────
    let lastMusicCmdTs = null;
    let lastPlanTimerCmdTs = null;
    let pendingPlay = false;
    // Track last-known remote state so we only apply when admin actually changes it
    let lastRemote = {};

    // Auto-unlock audio on first user interaction so remote commands work
    function tryUnlockAudio() {
      if (audioEl.src) {
        const t = audioEl.currentTime;
        audioEl.play().then(() => { audioEl.pause(); audioEl.currentTime = t; }).catch(() => {});
      }
      document.removeEventListener('click', tryUnlockAudio, true);
      document.removeEventListener('touchstart', tryUnlockAudio, true);
    }
    document.addEventListener('click', tryUnlockAudio, true);
    document.addEventListener('touchstart', tryUnlockAudio, true);

    function showAudioBanner() {
      document.getElementById('audioUnlockBanner').style.display = '';
    }

    function dismissAudioBanner() {
      document.getElementById('audioUnlockBanner').style.display = 'none';
      if (pendingPlay && songList.length) {
        if (currentSongIdx < 0) { currentSongIdx = 0; loadCurrentSong(); }
        audioEl.play().catch(() => {});
        document.getElementById('playPauseBtn').textContent = '\u23f8';
        pendingPlay = false;
      }
    }

    function safePlay() {
      audioEl.play().catch(function() {
        pendingPlay = true;
        showAudioBanner();
      });
      document.getElementById('playPauseBtn').textContent = '\u23f8';
    }

    function applyRemoteControl(ctrl) {
      if (!ctrl) return;
      // Only apply toggle states when the REMOTE value changed (admin toggled it),
      // not when it merely differs from local state (user toggled on dashboard).
      if (ctrl.timer_visible !== undefined && ctrl.timer_visible !== lastRemote.timer_visible) {
        timerVisible = ctrl.timer_visible;
        document.getElementById('timerPanel').style.display = timerVisible ? '' : 'none';
        document.getElementById('planningTimer').style.display = timerVisible ? '' : 'none';
        setToggleBtnState('toggleTimerBtn', timerVisible);
      }
      if (ctrl.game_rank_visible !== undefined && ctrl.game_rank_visible !== lastRemote.game_rank_visible) {
        gameRankVisible = ctrl.game_rank_visible;
        document.getElementById('gameRankPanel').style.display = gameRankVisible ? '' : 'none';
        setToggleBtnState('toggleGameRankBtn', gameRankVisible);
      }
      if (ctrl.series_visible !== undefined && ctrl.series_visible !== lastRemote.series_visible) {
        const el = document.getElementById('allRanking');
        const title = document.getElementById('seriesTitle');
        if (el) el.style.display = ctrl.series_visible ? '' : 'none';
        if (title) title.style.display = ctrl.series_visible ? '' : 'none';
        setToggleBtnState('toggleSeriesBtn', ctrl.series_visible);
      }
      if (ctrl.qr_visible !== undefined && ctrl.qr_visible !== lastRemote.qr_visible) {
        const container = document.getElementById('qrContainer');
        if (container) {
          container.style.display = ctrl.qr_visible ? 'block' : 'none';
          setToggleBtnState('topToggleQrBtn', ctrl.qr_visible);
          localStorage.setItem('qr_visible', ctrl.qr_visible ? 'true' : 'false');
        }
      }
      // Apply repeat state only when remote changes
      if (ctrl.repeat_one !== undefined && ctrl.repeat_one !== lastRemote.repeat_one) {
        repeatOne = ctrl.repeat_one;
        const btn = document.getElementById('repeatBtn');
        if (btn) {
          btn.style.opacity = repeatOne ? '1' : '0.4';
          btn.style.background = repeatOne ? '#dbeafe' : 'none';
          btn.style.borderRadius = '6px';
        }
      }
      // Execute planning timer commands (one-time)
      if (ctrl.plan_timer_cmd && ctrl.plan_timer_cmd_ts && ctrl.plan_timer_cmd_ts !== lastPlanTimerCmdTs) {
        lastPlanTimerCmdTs = ctrl.plan_timer_cmd_ts;
        if (ctrl.plan_timer_cmd === 'start') {
          document.getElementById('planMin').value = ctrl.plan_timer_min || 10;
          document.getElementById('planSec').value = ctrl.plan_timer_sec || 0;
          startPlanTimer();
        } else if (ctrl.plan_timer_cmd === 'reset') {
          resetPlanTimer();
        }
      }
      // Execute music commands (one-time)
      if (ctrl.music_cmd && ctrl.music_cmd_ts && ctrl.music_cmd_ts !== lastMusicCmdTs) {
        lastMusicCmdTs = ctrl.music_cmd_ts;
        if (ctrl.music_cmd === 'play') {
          if (songList.length) {
            // If a specific song index was requested, jump to it
            if (ctrl.music_song_idx != null && ctrl.music_song_idx >= 0 && ctrl.music_song_idx < songList.length) {
              currentSongIdx = ctrl.music_song_idx;
              loadCurrentSong();
            } else if (currentSongIdx < 0) {
              currentSongIdx = 0;
              loadCurrentSong();
            }
            audioEl.play().catch(function() {
              pendingPlay = true;
              showAudioBanner();
            });
            document.getElementById('playPauseBtn').textContent = '\u23f8';
          }
        } else if (ctrl.music_cmd === 'pause') {
          audioEl.pause();
          document.getElementById('playPauseBtn').textContent = '\u25b6';
        } else if (ctrl.music_cmd === 'next') {
          nextSong();
        } else if (ctrl.music_cmd === 'prev') {
          prevSong();
        }
      }
      // Snapshot the remote state so next poll only reacts to actual remote changes
      lastRemote = {
        timer_visible: ctrl.timer_visible,
        game_rank_visible: ctrl.game_rank_visible,
        series_visible: ctrl.series_visible,
        qr_visible: ctrl.qr_visible,
        repeat_one: ctrl.repeat_one
      };
    }
  </script>
</body>
</html>
