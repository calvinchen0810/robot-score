<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Score – Play</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container" id="app">
    <!-- Step 1: Join / Create team -->
    <div id="joinView">
      <h1 id="seriesLabel" style="margin:0;font-size:2rem"></h1>
      <div class="card" id="loadingMsg">
        <p class="text-center text-muted">Loading game…</p>
      </div>
      <div class="card" id="noGame" style="display:none">
        <p class="text-center text-muted">No active game right now. Please wait for admin to start one.</p>
      </div>
      <div id="gameReady" style="display:none">
        <div style="margin-bottom:8px;text-align:center">          
          <p id="gameLabel" class="text-sm text-muted" style="margin:4px 0 0;font-size:1.2rem;font-weight:600;text-align:center"></p>
        </div>
        <div class="card" id="createTeamCard">
          <label>Your Team Name</label>
          <input type="text" id="teamNameInput" placeholder="Enter team name…">
          <button class="btn btn-primary btn-block mt-2" onclick="joinOrCreate()">Join Game</button>
        </div>
        <div id="existingTeams" class="card" style="display:none">
          <h3>Existing Teams (tap to rejoin)</h3>
          <div id="teamList"></div>
        </div>
      </div>
    </div>

    <!-- Step 2: Score control -->
    <div id="scoreView" style="display:none">
      <div class="flex justify-between items-center" style="padding:8px 0">
        <div>
          <span class="text-sm text-muted" id="sv_series"></span>
          <div class="flex items-center gap-2">
            <h1 style="text-align:left;padding:0" id="sv_team"></h1>
            <button class="btn btn-sm" style="background:#e2e8f0;color:#334155;padding:4px 8px;font-size:0.75rem" onclick="renameTeam()">✏️</button>
          </div>
          <div id="sv_startOrder" style="display:none;font-size:1.8rem;font-weight:800;color:#2563eb;margin-top:2px">起點 #<span id="sv_orderNum"></span></div>
        </div>
        <div style="text-align:right">
          <div class="text-sm text-muted" id="sv_game"></div>
          <div id="sv_timer" style="font-size:1.1rem;font-weight:700;color:#16a34a;display:none"></div>
          <div style="font-size:2.8rem;font-weight:800;color:#d97706" id="sv_total">0</div>
        </div>
      </div>
      <div class="score-grid" id="buttonGrid"></div>
      <div id="gameStatusBanner" style="display:none;text-align:center;padding:12px;border-radius:8px;margin:8px 0;font-weight:700"></div>
      <button class="btn btn-warning btn-sm btn-block mt-4" onclick="leaveTeam()">← Back to team selection</button>
    </div>
  </div>

  <script>
    let gameData = null;
    let currentTeamId = null;
    let currentTeamName = '';
    let clickState = {}; // button_id -> clicks
    let gameTotalState = {}; // button_id -> total clicks across all teams in game
    let gameStatus = 'stopped'; // running, paused, stopped

    async function api(url, opts) {
      const r = await fetch(url, opts);
      if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
      return r.json();
    }

    async function loadActive() {
      const d = await api('/api/active');
      gameData = d;
      document.getElementById('loadingMsg').style.display = 'none';
      if (!d.series || !d.game) {
        document.getElementById('noGame').style.display = '';
        return;
      }
      document.getElementById('gameReady').style.display = '';
      document.getElementById('seriesLabel').textContent = '🤖 ' + d.series.name;
      document.getElementById('gameLabel').textContent = d.game.name;
      // Respect admin-controlled allow_create_team flag
      try {
        const allow = (d.allow_create_team === undefined) ? true : !!d.allow_create_team;
        const createCard = document.getElementById('createTeamCard');
        if (createCard) createCard.style.display = allow ? '' : 'none';
      } catch(e) {}
      loadTeams();
    }

    async function loadTeams() {
      if (!gameData?.game) return;
      const teams = await api('/api/games/' + gameData.game.id + '/teams');
      if (teams.length > 0) {
        document.getElementById('existingTeams').style.display = '';
        document.getElementById('teamList').innerHTML = teams.map(t =>
          '<button class="btn btn-sm" style="margin:4px;background:#e2e8f0;color:#334155" onclick="rejoin(' + t.id + ',\'' + escHtml(t.name) + '\',' + (t.start_order || 0) + ')">' + escHtml(t.name) + (t.start_order ? ' <span style="color:#2563eb;font-weight:700;font-size:0.85rem;display:inline-block;margin-left:6px">起點 #' + t.start_order + '</span>' : '') + '</button>'
        ).join('');
      }
    }

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    async function joinOrCreate() {
      const name = document.getElementById('teamNameInput').value.trim();
      if (!name) return alert('Please enter a team name');
      const t = await api('/api/teams', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, game_id: gameData.game.id })
      });
      enterScoring(t.id, t.name, t.start_order);
    }

    function rejoin(tid, name, startOrder) { enterScoring(tid, name, startOrder); }

    async function enterScoring(tid, name, startOrder) {
      currentTeamId = tid;
      currentTeamName = name;
      document.getElementById('joinView').style.display = 'none';
      document.getElementById('scoreView').style.display = '';
      document.getElementById('sv_series').textContent = gameData.series.name;
      document.getElementById('sv_game').textContent = gameData.game.name;
      document.getElementById('sv_team').textContent = name;

      // Show start order if assigned
      if (startOrder) {
        document.getElementById('sv_startOrder').style.display = '';
        document.getElementById('sv_orderNum').textContent = startOrder;
      } else {
        document.getElementById('sv_startOrder').style.display = 'none';
      }

      // Load existing scores
      const scores = await api('/api/teams/' + tid + '/scores');
      clickState = {};
      gameTotalState = {};
      gameData.buttons.forEach(b => {
        clickState[b.id] = scores[b.id]?.clicks || 0;
        gameTotalState[b.id] = scores[b.id]?.game_total || 0;
      });
      gameStatus = gameData.game?.status || 'stopped';
      renderButtons();
      updateStatusBanner();
      updateTimer(gameData.game?.remaining_seconds);
      // Poll game status every 3s
      if (window._statusInterval) clearInterval(window._statusInterval);
      window._statusInterval = setInterval(pollStatus, 3000);
    }

    async function pollStatus() {
      try {
        const d = await api('/api/active');
        const newStatus = d.game?.status || 'stopped';
        // Update button config in case admin changed max limits
        if (d.buttons) gameData.buttons = d.buttons;
        if (newStatus !== gameStatus) {
          gameStatus = newStatus;
          updateStatusBanner();
        }
        // Update timer
        updateTimer(d.game?.remaining_seconds);
        // Always refresh scores from server (other teams may have scored)
        if (currentTeamId) {
          const scores = await api('/api/teams/' + currentTeamId + '/scores');
          gameData.buttons.forEach(b => {
            clickState[b.id] = scores[b.id]?.clicks || 0;
            gameTotalState[b.id] = scores[b.id]?.game_total || 0;
          });
          // Update start order if admin randomized
          if (d.game) {
            const teams = await api('/api/games/' + d.game.id + '/teams');
            const me = teams.find(t => t.id === currentTeamId);
            if (me && me.start_order) {
              document.getElementById('sv_startOrder').style.display = '';
              document.getElementById('sv_orderNum').textContent = me.start_order;
            }
          }
        }
        renderButtons();
      } catch(e) {}
    }

    function updateTimer(remaining) {
      const el = document.getElementById('sv_timer');
      if (remaining == null) { el.style.display = 'none'; return; }
      el.style.display = '';
      const rem = Math.max(0, Math.ceil(remaining));
      const mins = Math.floor(rem / 60);
      const secs = rem % 60;
      el.textContent = '\u23f1 ' + mins + ':' + String(secs).padStart(2, '0');
      el.style.color = rem <= 10 ? '#dc2626' : rem <= 30 ? '#f59e0b' : '#16a34a';
    }

    function updateStatusBanner() {
      const banner = document.getElementById('gameStatusBanner');
      if (gameStatus === 'paused') {
        banner.style.display = '';
        banner.style.background = '#fef3c7';
        banner.style.color = '#b45309';
        banner.textContent = '⏸ Game Paused – Scoring disabled';
      } else if (gameStatus === 'stopped') {
        banner.style.display = '';
        banner.style.background = '#dbeafe';
        banner.style.color = '#2563eb';
        banner.textContent = '⏳ Waiting for game to start…';
      } else {
        banner.style.display = 'none';
      }
    }

    function renderButtons() {
      const grid = document.getElementById('buttonGrid');
      const disabled = gameStatus !== 'running';
      grid.innerHTML = gameData.buttons.map(b => {
        const clicks = clickState[b.id] || 0;
        const gameTotal = gameTotalState[b.id] || 0;
        const atTeamMax = b.max_clicks != null && clicks >= b.max_clicks;
        const atGameMax = b.max_clicks_game != null && gameTotal >= b.max_clicks_game;
        const atMax = atTeamMax || atGameMax;
        const teamMax = b.max_clicks != null ? 'team:' + b.max_clicks : '';
        const gameMax = b.max_clicks_game != null ? 'game:' + b.max_clicks_game : '';
        const maxLabel = [teamMax, gameMax].filter(Boolean).join(' ');
        const imgTag = b.image_url ? '<img src="' + escHtml(b.image_url) + '" alt="">' : '';
        const disAttr = disabled ? ' disabled style="opacity:0.4;pointer-events:none"' : '';
        const plusDisAttr = (disabled || atMax) ? ' disabled style="opacity:0.4;pointer-events:none"' : '';
        const countStyle = atMax ? 'color:#dc2626' : 'color:#2563eb';
        return '<div class="score-btn-wrap"' + (disabled ? ' style="opacity:0.6"' : '') + '>'
          + imgTag
          + '<div class="label">' + escHtml(b.label) + '</div>'
          + '<div class="pts">' + b.points + ' pts/click ' + (maxLabel ? '(' + maxLabel + ')' : '') + '</div>'
          + '<div class="click-count" id="cc_' + b.id + '" style="' + countStyle + '">' + clicks + '</div>'
          + '<div class="btn-row">'
          + '  <button class="btn btn-danger"' + disAttr + ' onclick="doScore(' + b.id + ',-1)">−</button>'
          + '  <button class="btn btn-success" id="plus_' + b.id + '"' + plusDisAttr + ' onclick="doScore(' + b.id + ',+1)">+</button>'
          + '</div>'
          + '</div>';
      }).join('');
      updateTotal();
    }

    function updateTotal() {
      let total = 0;
      gameData.buttons.forEach(b => { total += (clickState[b.id] || 0) * b.points; });
      document.getElementById('sv_total').textContent = total;
    }

    async function doScore(btnId, delta) {
      try {
        const r = await api('/api/score', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ team_id: currentTeamId, button_id: btnId, delta })
        });
        clickState[btnId] = r.clicks;
        gameTotalState[btnId] = r.game_total;
        const el = document.getElementById('cc_' + btnId);
        el.textContent = r.clicks;
        const btn = gameData.buttons.find(b => b.id === btnId);
        const atTeamMax = btn && btn.max_clicks != null && r.clicks >= btn.max_clicks;
        const atGameMax = btn && btn.max_clicks_game != null && r.game_total >= btn.max_clicks_game;
        const atMax = atTeamMax || atGameMax;
        el.style.color = atMax ? '#dc2626' : '#2563eb';
        const plusBtn = document.getElementById('plus_' + btnId);
        if (plusBtn) {
          plusBtn.disabled = atMax;
          plusBtn.style.opacity = atMax ? '0.4' : '';
          plusBtn.style.pointerEvents = atMax ? 'none' : '';
        }
        updateTotal();
      } catch (e) {
        // Max clicks or error – ignore silently
      }
    }

    async function renameTeam() {
      const newName = prompt('Enter new team name:', currentTeamName);
      if (!newName || !newName.trim() || newName.trim() === currentTeamName) return;
      const t = await api('/api/teams/' + currentTeamId, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name: newName.trim() })
      });
      currentTeamName = t.name;
      document.getElementById('sv_team').textContent = t.name;
    }

    function leaveTeam() {
      currentTeamId = null;
      if (window._statusInterval) clearInterval(window._statusInterval);
      document.getElementById('scoreView').style.display = 'none';
      document.getElementById('joinView').style.display = '';
      loadTeams();
    }

    loadActive();
  </script>
</body>
</html>
